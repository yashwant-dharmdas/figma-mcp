name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-typecheck:
    name: Build & Type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install shared package first (figma-mcp depends on it via file:)
      - name: Install shared dependencies
        working-directory: packages/shared
        run: npm install

      # Install figma-mcp (resolves @figma-mcp/shared from file:../shared)
      - name: Install figma-mcp dependencies
        working-directory: packages/figma-mcp
        run: npm install

      # Type check shared
      - name: Type check — shared
        working-directory: packages/shared
        run: npx tsc --noEmit

      # Build figma-mcp (tsup bundles shared inline → dist/index.js)
      - name: Build — figma-mcp
        working-directory: packages/figma-mcp
        run: npm run build
