name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check — shared
        run: cd packages/shared && bunx tsc --noEmit

      - name: Type check — relay
        run: cd packages/relay && bunx tsc --noEmit

      - name: Type check — mcp-server
        run: cd packages/mcp-server && bunx tsc --noEmit

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build relay image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/relay/Dockerfile
          push: false
          tags: figma-mcp-relay:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build mcp-server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/mcp-server/Dockerfile
          push: false
          tags: figma-mcp-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
