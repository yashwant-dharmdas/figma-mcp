<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      background: var(--figma-color-bg, #fff);
      color: var(--figma-color-text, #1a1a1a);
      padding: 12px 14px;
      user-select: none;
    }

    .label {
      font-size: 11px;
      color: var(--figma-color-text-secondary, #888);
      margin-bottom: 4px;
    }

    .channel-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    #channel-id {
      font-family: "SF Mono", "JetBrains Mono", "Fira Code", monospace;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--figma-color-text-brand, #0066ff);
      flex: 1;
    }

    button {
      font-size: 11px;
      font-family: inherit;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--figma-color-border, #ddd);
      background: var(--figma-color-bg-secondary, #f5f5f5);
      color: var(--figma-color-text, #1a1a1a);
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      background: var(--figma-color-bg-hover, #eee);
    }

    .status {
      font-size: 11px;
      padding: 4px 0;
      margin-bottom: 8px;
    }

    .status--connecting { color: var(--figma-color-text-secondary, #888); }
    .status--connected  { color: #1a8c4e; }
    .status--disconnected { color: var(--figma-color-text-secondary, #888); }
    .status--error      { color: #d93025; }

    details {
      border-top: 1px solid var(--figma-color-border, #eee);
      padding-top: 8px;
    }

    summary {
      font-size: 11px;
      color: var(--figma-color-text-secondary, #888);
      cursor: pointer;
      list-style: none;
    }

    summary::-webkit-details-marker { display: none; }
    summary::before { content: "▸ "; }
    details[open] summary::before { content: "▾ "; }

    .settings-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 6px;
    }

    #relay-url {
      flex: 1;
      font-size: 11px;
      font-family: monospace;
      padding: 3px 6px;
      border: 1px solid var(--figma-color-border, #ddd);
      border-radius: 4px;
      background: var(--figma-color-bg, #fff);
      color: var(--figma-color-text, #1a1a1a);
    }
  </style>
</head>
<body>
  <p class="label">Channel ID — paste into your MCP client after calling join_channel:</p>

  <div class="channel-row">
    <span id="channel-id">--------</span>
    <button id="copy-btn">Copy</button>
  </div>

  <p class="status status--connecting" id="status">Connecting…</p>

  <details>
    <summary>Settings</summary>
    <div class="settings-row">
      <input id="relay-url" type="text" value="ws://localhost:3055" placeholder="ws://localhost:3055" />
      <button id="reconnect-btn">Reconnect</button>
    </div>
  </details>

  <!-- __SCRIPT__ -->
</body>
</html>
