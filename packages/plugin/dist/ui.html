<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      background: var(--figma-color-bg, #fff);
      color: var(--figma-color-text, #1a1a1a);
      padding: 14px 16px;
      user-select: none;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .status {
      font-size: 12px;
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status--connecting .dot { background: #f0a500; }
    .status--connected  .dot { background: #1a8c4e; }
    .status--disconnected .dot { background: #aaa; }
    .status--error      .dot { background: #d93025; }

    .status--connecting span { color: var(--figma-color-text-secondary, #888); }
    .status--connected  span { color: #1a8c4e; }
    .status--disconnected span { color: var(--figma-color-text-secondary, #888); }
    .status--error      span { color: #d93025; }

    details {
      border-top: 1px solid var(--figma-color-border, #eee);
      margin-top: 10px;
      padding-top: 8px;
    }

    summary {
      font-size: 11px;
      color: var(--figma-color-text-secondary, #888);
      cursor: pointer;
      list-style: none;
    }

    summary::-webkit-details-marker { display: none; }
    summary::before { content: "▸ "; }
    details[open] summary::before { content: "▾ "; }

    .settings-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }

    #server-url {
      flex: 1;
      font-size: 11px;
      font-family: monospace;
      padding: 4px 6px;
      border: 1px solid var(--figma-color-border, #ddd);
      border-radius: 4px;
      background: var(--figma-color-bg, #fff);
      color: var(--figma-color-text, #1a1a1a);
    }

    button {
      font-size: 11px;
      font-family: inherit;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--figma-color-border, #ddd);
      background: var(--figma-color-bg-secondary, #f5f5f5);
      color: var(--figma-color-text, #1a1a1a);
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { background: var(--figma-color-bg-hover, #eee); }
  </style>
</head>
<body>
  <p class="title">Figma MCP</p>

  <div class="status status--connecting" id="status">
    <span class="dot"></span>
    <span id="status-text">Connecting…</span>
  </div>

  <details>
    <summary>Settings</summary>
    <div class="settings-row">
      <input id="server-url" type="text" value="ws://localhost:3001" placeholder="ws://localhost:3001" />
      <button id="reconnect-btn">Reconnect</button>
    </div>
  </details>

  <script>
"use strict";
(() => {
  // src/ui.ts
  var statusEl = document.getElementById("status");
  var statusTextEl = document.getElementById("status-text");
  var serverUrlInput = document.getElementById("server-url");
  var reconnectBtn = document.getElementById("reconnect-btn");
  function setStatus(text, type) {
    statusTextEl.textContent = text;
    statusEl.className = `status status--${type}`;
  }
  var ws = null;
  function connect() {
    if (ws) {
      ws.onclose = null;
      ws.onerror = null;
      try {
        ws.close();
      } catch (e) {
      }
      ws = null;
    }
    const url = serverUrlInput.value.trim() || "ws://localhost:3001";
    setStatus("Connecting\u2026", "connecting");
    ws = new WebSocket(url);
    ws.onopen = () => {
      setStatus("Connected to figma-mcp", "connected");
    };
    ws.onmessage = (event) => {
      let msg;
      try {
        msg = JSON.parse(event.data);
      } catch (e) {
        return;
      }
      if (msg["type"] === "connected") return;
      if (msg["command"]) {
        parent.postMessage({ pluginMessage: msg }, "*");
      }
    };
    ws.onerror = () => {
      setStatus("Cannot connect \u2014 is figma-mcp running?", "error");
    };
    ws.onclose = (event) => {
      if (event.wasClean) {
        setStatus("Disconnected", "disconnected");
      } else {
        setStatus("Connection lost \u2014 click Reconnect", "error");
      }
    };
  }
  window.onmessage = (event) => {
    const { pluginMessage } = event.data;
    if (!pluginMessage) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify(pluginMessage));
  };
  reconnectBtn.addEventListener("click", () => connect());
  connect();
})();

</script>
</body>
</html>
